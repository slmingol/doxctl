name: auto-version

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'

jobs:
  auto-tag:
    name: Auto Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest semantic version tag (excluding pre-release tags)
          LATEST_TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v '-' | head -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found, starting at 1.0.0"
            NEW_TAG="1.0.0"
          else
            echo "Latest tag: $LATEST_TAG"
            
            # Extract MAJOR.MINOR.PATCH
            MAJOR=$(echo $LATEST_TAG | cut -d. -f1)
            MINOR=$(echo $LATEST_TAG | cut -d. -f2)
            PATCH=$(echo $LATEST_TAG | cut -d. -f3)
            
            # Increment PATCH version
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_TAG"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.get_tag.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.get_tag.outputs.new_tag }} already exists, skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.get_tag.outputs.new_tag }}
          git push origin ${{ steps.get_tag.outputs.new_tag }}
          echo "✅ Created and pushed tag: ${{ steps.get_tag.outputs.new_tag }}"
