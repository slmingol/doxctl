name: artifact-janitor

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC
  workflow_dispatch:

jobs:
  cleanup_releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete old releases (keep latest 10)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
          delete_tag_pattern: '^[0-9]+\.[0-9]+\.[0-9]+-alpha$'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
